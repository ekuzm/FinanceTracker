server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://finance-tracker:8080;
  }

  location /v3/ {
    proxy_pass http://finance-tracker:8080;
  }

  location /swagger-ui/ {
    proxy_pass http://finance-tracker:8080;
  }
}
