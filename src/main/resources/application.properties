spring.config.import=optional:file:.env[.properties]
spring.application.name=finance-tracker

server.port=8080

spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.url=${DB_URL:jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.highlight_sql=true

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/db.changelog-master.yaml

logging.level.com.finance.tracker=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR

logging.file.name=./logs/application.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB

spring.output.ansi.enabled=ALWAYS

logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){cyan} 
%clr(%-5level){%clr(ERROR){red}%clr(WARN){yellow}%clr(INFO){green}%clr(DEBUG){blue}%clr(TRACE){magenta}} 
%clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){yellow} %clr(:){faint} %m%n%clr(%wEx){red}
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
