databaseChangeLog:
  - changeSet:
        id: 007-create-transactions
        author: ekuzm
        changes:
          - createTable:
                tableName: transactions
                columns:
                  - column:
                        name: id
                        type: BIGINT
                        autoIncrement: true
                        constraints:
                            primaryKey: true
                            primaryKeyName: pk_transactions
                            nullable: false
                  - column:
                        name: occurred_at
                        type: TIMESTAMP
                        constraints:
                            nullable: false
                  - column:
                        name: amount
                        type: NUMERIC(19,2)
                        constraints:
                            nullable: false
                            checkConstraint: amount > 0
                  - column:
                        name: description
                        type: VARCHAR(255)
                        constraints:
                            nullable: false
                  - column:
                        name: type
                        type: transaction_type
                        constraints:
                            nullable: false
                  - column:
                        name: account_id
                        type: BIGINT
                        constraints:
                            nullable: false
                  - column:
                        name: transfer_id
                        type: UUID
          - addForeignKeyConstraint:
                baseTableName: transactions
                baseColumnNames: account_id
                referencedTableName: accounts
                referencedColumnNames: id
                constraintName: fk_transactions_account
                onDelete: RESTRICT
                onUpdate: CASCADE
          - addForeignKeyConstraint:
                baseTableName: transactions
                baseColumnNames: transfer_id
                referencedTableName: transfers
                referencedColumnNames: id
                constraintName: fk_transactions_transfer
                onDelete: CASCADE
                onUpdate: CASCADE
