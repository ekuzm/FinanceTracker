databaseChangeLog:
- changeSet:
    id: 003-create-tags
    author: ekuzm
    changes:
    - createTable:
        tableName: tags
        columns:
        - column:
            name: id
            type: BIGINT
            autoIncrement: true
            constraints:
              primaryKey: true
              primaryKeyName: pk_tags
              nullable: false
        - column:
            name: name
            type: VARCHAR(50)
            constraints:
              nullable: false
        - column:
            name: normalized_name
            type: VARCHAR(50)
            constraints:
              nullable: false
        - column:
            name: user_id
            type: BIGINT
            constraints:
              nullable: false
    - addForeignKeyConstraint:
        baseTableName: tags
        baseColumnNames: user_id
        referencedTableName: users
        referencedColumnNames: id
        constraintName: fk_tags_user
        onDelete: CASCADE
        onUpdate: CASCADE
    - addUniqueConstraint:
        tableName: tags
        columnNames: user_id, normalized_name
        constraintName: uk_tags_user_normalized_name
