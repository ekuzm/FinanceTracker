databaseChangeLog:
- changeSet:
    id: 003-create-tags
    author: ekuzm
    changes:
    - createTable:
        tableName: tags
        columns:
        - column:
            name: id
            type: BIGINT
            autoIncrement: true
            constraints:
              primaryKey: true
              primaryKeyName: pk_tags
              nullable: false
        - column:
            name: name
            type: VARCHAR(50)
            constraints:
              nullable: false
              checkConstraint: name = lower(trim(name))
    - addUniqueConstraint:
        tableName: tags
        columnNames: name
        constraintName: uk_tags_name
