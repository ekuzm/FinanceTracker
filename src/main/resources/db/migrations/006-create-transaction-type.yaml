databaseChangeLog:
  - changeSet:
        id: 006-create-transaction-type
        author: ekuzm
        changes:
          - sql:
                dbms: postgresql
                splitStatements: false
                sql: |
                    DO $$
                    BEGIN
                        CREATE TYPE transaction_type AS ENUM (
                            'INCOME',
                            'EXPENSE'
                        );
                    EXCEPTION
                        WHEN duplicate_object THEN null;
                    END$$;
