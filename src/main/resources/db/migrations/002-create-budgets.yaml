databaseChangeLog:
- changeSet:
    id: 002-create-budgets
    author: ekuzm
    changes:
    - createTable:
        tableName: budgets
        columns:
        - column:
            name: id
            type: BIGINT
            autoIncrement: true
            constraints:
              primaryKey: true
              primaryKeyName: pk_budgets
              nullable: false
        - column:
            name: name
            type: VARCHAR(50)
            constraints:
              nullable: false
        - column:
            name: limit_amount
            type: NUMERIC(19,2)
            constraints:
              nullable: false
        - column:
            name: start_date
            type: DATE
            constraints:
              nullable: false
        - column:
            name: end_date
            type: DATE
            constraints:
              nullable: false
              checkConstraint: start_date <= end_date
        - column:
            name: user_id
            type: BIGINT
            constraints:
              nullable: false
    - addForeignKeyConstraint:
        baseTableName: budgets
        baseColumnNames: user_id
        referencedTableName: users
        referencedColumnNames: id
        constraintName: fk_budgets_user
        onDelete: CASCADE
        onUpdate: CASCADE
