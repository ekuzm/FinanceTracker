name: CI

on:
  push:
    branches:
      - main
  pull_request:
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-sonar:
    name: Build, Lint, Test and SonarQube Cloud
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: https://sonarcloud.io
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || github.repository_owner }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || 'ekuzm_FinanceTracker' }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Build, lint, test and generate coverage
        run: ./mvnw -B -Pcoverage verify

      - name: SonarQube Cloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is not configured. Skipping SonarQube Cloud analysis."
            exit 0
          fi

          if [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "SONAR_PROJECT_KEY is not configured. Skipping SonarQube Cloud analysis."
            exit 0
          fi

          ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -DskipTests \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.organization="$SONAR_ORGANIZATION" \
            -Dsonar.projectKey="$SONAR_PROJECT_KEY"
