name: Push Docker Images

on:
    workflow_call:

jobs:
    image-build-and-push:
        name: Build and push Docker images
        runs-on: ubuntu-latest
        timeout-minutes: 30

        env:
            REGISTRY_HOST: "cr.selcloud.ru"
            IMAGE_REGISTRY: "cr.selcloud.ru/finance-tracker"
            BACKEND_NAME: "finance-tracker-backend"
            FRONTEND_NAME: "finance-tracker-frontend"

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Registry
              run: docker login -u ${{ secrets.REGISTRY_USERNAME }} -p ${{ secrets.REGISTRY_PASSWORD }} $REGISTRY_HOST

            - name: Build and push backend image
              run: |
                  TAG_NAME=$(echo $GITHUB_SHA | head -c7)
                  docker buildx build \
                    --no-cache \
                    --push \
                    --tag $IMAGE_REGISTRY/$BACKEND_NAME:$TAG_NAME \
                    --tag $IMAGE_REGISTRY/$BACKEND_NAME:latest \
                    --file Dockerfile \
                    .

            - name: Build and push frontend image
              run: |
                  TAG_NAME=$(echo $GITHUB_SHA | head -c7)
                  docker buildx build \
                    --no-cache \
                    --push \
                    --tag $IMAGE_REGISTRY/$FRONTEND_NAME:$TAG_NAME \
                    --tag $IMAGE_REGISTRY/$FRONTEND_NAME:latest \
                    --file ./frontend/Dockerfile \
                    ./frontend
