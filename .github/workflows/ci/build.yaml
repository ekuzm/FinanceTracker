name: Build

on:
    workflow_call:

jobs:
    backend-build:
        name: Backend Build
        runs-on: ubuntu-latest
        permissions:
            contents: read
        timeout-minutes: 20

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: "21"
                  distribution: temurin

            - name: Cache Maven packages
              uses: actions/cache@v4
              with:
                  path: ~/.m2
                  key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
                  restore-keys: ${{ runner.os }}-m2

            - name: Build backend
              run: sh mvnw -B -DskipTests package

    frontend-build:
        name: Frontend Build
        runs-on: ubuntu-latest
        permissions:
            contents: read
        timeout-minutes: 10
        defaults:
            run:
                working-directory: frontend

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install dependencies
              run: npm install

            - name: Build frontend
              run: npm run build
