name: Deploy

on:
    workflow_call:

jobs:
    deploy:
        name: Deploy to server
        runs-on: ubuntu-latest
        timeout-minutes: 20
        
        env:
            REGISTRY_HOST: "cr.selcloud.ru"
            IMAGE_REGISTRY: "cr.selcloud.ru/finance-tracker"
            BACKEND_NAME: "finance-tracker-backend"
            FRONTEND_NAME: "finance-tracker-frontend"

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Copy docker-compose file to server
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  source: "docker-compose.yaml"
                  target: "/opt/finance-tracker"

            - name: Deploy application via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  script: |
                      mkdir -p /opt/finance-tracker
                      cd /opt/finance-tracker

                      export REGISTRY="${{ env.IMAGE_REGISTRY }}"
                      export BACKEND_IMAGE_NAME="${{ env.BACKEND_NAME }}"
                      export FRONTEND_IMAGE_NAME="${{ env.FRONTEND_NAME }}"
                      export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
                      export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
                      export POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
                      export POSTGRES_HOST="${{ secrets.POSTGRES_HOST }}"
                      export POSTGRES_PORT="${{ secrets.POSTGRES_PORT }}"
                      export FINANCE_TRACKER_PORT="${{ secrets.FINANCE_TRACKER_PORT }}"
                      export FRONTEND_PORT="${{ secrets.FRONTEND_PORT }}"

                      docker login -u "${{ secrets.REGISTRY_USERNAME }}" -p "${{ secrets.REGISTRY_PASSWORD }}" "${{ env.REGISTRY_HOST }}"
                      docker compose -f docker-compose.yaml pull
                      docker compose -f docker-compose.yaml up -d --remove-orphans
                      docker image prune -af
