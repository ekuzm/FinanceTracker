name: Health Check

on:
    workflow_call:

jobs:
    health-check:
        name: Health Check
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Wait for backend container to become healthy
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  script: |
                      cd /opt/finance-tracker

                      for attempt in $(seq 1 30); do
                          STATUS=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' finance-tracker 2>/dev/null || echo "missing")
                          if [ "$STATUS" = "healthy" ]; then
                              echo "finance-tracker is healthy"
                              exit 0
                          fi

                          echo "Attempt ${attempt}/30: finance-tracker status=${STATUS}"
                          sleep 5
                      done

                      echo "finance-tracker did not become healthy in time"
                      docker compose -f docker-compose.yaml ps
                      docker logs --tail 100 finance-tracker || true
                      exit 1
