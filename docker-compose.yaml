services:
  pg:
    container_name: postgres-finance-tracker
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - finance-tracker-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - finance-tracker-net
  finance-tracker:
    container_name: finance-tracker
    image: ${REGISTRY}/${BACKEND_IMAGE_NAME}:latest
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_URL=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    ports:
      - ${FINANCE_TRACKER_PORT}:8080
    depends_on: 
      pg:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent http://localhost:8080/api/v1/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    volumes:
      - /Users/egorkuzmenkov/Programming/java/FinanceTracker/logs:/app/logs
    networks:
      - finance-tracker-net
  finance-tracker-frontend:
    container_name: finance-tracker-frontend
    image: ${REGISTRY}/${FRONTEND_IMAGE_NAME}:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - ${FRONTEND_PORT}:80
    depends_on:
      finance-tracker:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - finance-tracker-net

volumes:
  finance-tracker-data:

networks:
  finance-tracker-net:
